repos:
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        files: \.(mjs|js|json|yaml|yml|md)$
      - id: eslint
        name: ESLint
        entry: npx eslint --fix
        language: system
        files: \.(mjs|js)$
      - id: tests
        name: Tests
        entry: npm test
        language: system
        pass_filenames: false
        files: \.(mjs|js)$
