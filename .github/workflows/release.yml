name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update module.json
        run: |
          jq --arg v "${{ steps.version.outputs.value }}" \
             --arg dl "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip" \
             --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
             '. + {version: $v, download: $dl, manifest: $manifest}' \
             module.json > tmp.json && mv tmp.json module.json

      - name: Create module.zip
        run: zip -r module.zip module.json scripts/

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            module.zip \
            module.json \
            --clobber

      # Uncomment after obtaining a package token from foundryvtt.com
